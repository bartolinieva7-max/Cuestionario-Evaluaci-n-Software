<div class="evaluation-container">

    📋 Evaluación · Software y Optimización
    <small>10 preguntas aleatorias</small>

<script>
  (function(){
    "use strict";

    // ---------- BANCO DE PREGUNTAS UNIFICADO (40 preguntas) ----------
    // Preguntas 1-20: del primer cuestionario (Software de Sistema y Utilitarios)
    // Preguntas 21-40: del segundo (Optimización y Fundamentos)
    const bank = [];

    // ----- Primer bloque: 20 preguntas (archivo deepseek_html_20260415_36ef32.html) -----
    const block1 = [
      { text: "¿Cuál es la función principal del software de sistema?",
        opts: ["Realizar tareas específicas para el usuario final, como escribir textos.", "Controlar y gestionar el hardware, proporcionando una plataforma para otros programas.", "Crear, probar y mantener exclusivamente otros programas de aplicación."],

        correct: "B", exp: "La B es correcta porque la fragmentación significa que los pedazos de un archivo están dispersos, y el desfragmentador los une." },
      { text: "¿Qué tarea realiza específicamente un software antivirus como AVG o Windows Defender?",
        opts: ["Analizar el uso de la CPU y cerrar programas que no responden.", "Detectar, eliminar y bloquear programas maliciosos o malware en tiempo real.", "Reservar espacio en la memoria RAM para que las aplicaciones se ejecuten."],
        correct: "B", exp: "La B es correcta ya que su misión es patrullar y proteger las puertas de entrada contra amenazas." },
      { text: "¿Para qué sirve la aplicación CCleaner según los materiales?",
        opts: ["Para realizar una limpieza a fondo del PC, ganar espacio y evitar que se ralentice.", "Para compilar código de programación en lenguajes como Python o C++.", "Para conectar el ratón y el teclado con el sistema operativo."],
        correct: "A", exp: "La A es la correcta; es una herramienta de puesta a punto del sistema para ganar espacio en el disco duro." },
      { text: "¿Qué función cumple el Administrador de Tareas en situaciones críticas?",
        opts: ["Desfragmentar el disco duro cuando el sistema se siente lento.", "Permitir forzar el cierre de programas que se quedan congelados o no responden.", "Instalar automáticamente las actualizaciones de seguridad del antivirus."],
        correct: "B", exp: "La B es correcta; es el 'jefe de operaciones' que permite cerrar los programas que se portan mal." },
      { text: "¿Cuál es la combinación de teclas para abrir el Administrador de Tareas en Windows?",
        opts: ["Alt + F4", "Ctrl + Alt + Supr", "Ctrl + Shift + Esc"],
        correct: "C", exp: "La C es la correcta según el 'reto' propuesto en las fuentes para curiosear la lista de procesos." },
      { text: "En la analogía del 'Portero y el Paquete', ¿quién representa al cargador de programas?",
        opts: ["El paquete sellado que llega al edificio.", "El portero que recibe, verifica y lleva el paquete al apartamento.", "El dueño del edificio que solo observa desde lejos."],
        correct: "B", exp: "La B es la correcta; el cargador es como un portero que prepara todo para que el programa pueda abrirse y funcionar en la RAM." },
      { text: "¿Cuál es el primer paso que realiza el cargador de programas?",
        opts: ["Reservar un lugar en la memoria RAM.", "Localizar el archivo en el disco duro y verificar sus permisos.", "Entregarle las llaves al programa para que empiece a correr."],
        correct: "B", exp: "La B es la correcta; el primer paso es encontrar el paquete (programa) en el almacenamiento." },
      { text: "¿Qué sucede durante el paso de 'Reserva de memoria' en la carga de un programa?",
        opts: ["El sistema borra archivos temporales para hacer espacio.", "El cargador solicita al sistema operativo espacio en la RAM para el código y los datos.", "Se aumenta físicamente la capacidad del disco duro."],
        correct: "B", exp: "La B es correcta; se prepara el 'departamento' (espacio en RAM) antes de mover el contenido." },
      { text: "¿Qué son los 'enlaces dinámicos' en el proceso de carga?",
        opts: ["Conexiones inalámbricas a internet que el programa necesita para bajar virus.", "La conexión del programa con bibliotecas compartidas y dependencias necesarias.", "Accesos directos que el usuario crea en el escritorio."],
        correct: "B", exp: "La B es correcta; es el cuarto paso donde el programa se conecta con las herramientas que necesita." },
      { text: "¿Cuál es una diferencia clave entre el software de sistema y el de aplicación?",
        opts: ["El de sistema interactúa constantemente con el usuario, el de aplicación no.", "El de sistema trabaja en segundo plano; el de aplicación tiene interacción directa.", "El de sistema es opcional, mientras que el de aplicación es obligatorio para que la PC prenda."],
        correct: "B", exp: "La B es la correcta según la tabla comparativa; el software de sistema es la base independiente." },
      { text: "¿Cuál de los siguientes es un ejemplo de software de programación?",
        opts: ["Google Chrome y Microsoft Word.", "Windows 11 y macOS.", "Compiladores, editores de código y entornos de desarrollo (IDE)."],
        correct: "C", exp: "La C es la correcta; son herramientas para que los desarrolladores creen otros programas." },
      { text: "¿Qué sucede si una computadora no cuenta con programas utilitarios?",
        opts: ["Se vuelve más rápida porque tiene menos programas instalados.", "Se vuelve lenta, insegura y propenso a errores frecuentes.", "No pasa nada, ya que el hardware se mantiene solo."],
        correct: "B", exp: "La B es la correcta; sin mantenimiento (limpieza, antivirus, optimización), el ordenador pierde salud." },
      { text: "¿Qué aspecto del sistema monitoriza el Administrador de Tareas en tiempo real?",
        opts: ["El historial de navegación de todos los usuarios de la red.", "El uso de CPU, memoria RAM, disco y red por cada proceso.", "La temperatura física de la habitación donde está la PC."],
        correct: "B", exp: "La B es la correcta; ofrece una vista panorámica del consumo de recursos." },
      { text: "Según las fuentes, ¿qué empresa es la propietaria actual de AVG Antivirus?",
        opts: ["Microsoft.", "Avast.", "Google."],
        correct: "B", exp: "La B es la correcta; el texto indica que actualmente AVG es propiedad de Avast." },
      { text: "¿Por qué se dice que el desfragmentador es 'menos necesario en SSD'?",
        opts: ["Porque los SSD borran los archivos automáticamente cada noche.", "Porque su estructura física maneja los datos de forma distinta a los discos tradicionales (HDD).", "Porque los SSD no pueden almacenar archivos de gran tamaño."],
        correct: "B", exp: "La B es correcta; el material especifica que es especialmente útil en discos tradicionales (HDD)." },
      { text: "¿Cuál es el propósito de la pestaña 'Procesos' en el Administrador de Tareas?",
        opts: ["Cambiar el fondo de pantalla del escritorio.", "Identificar qué programas están consumiendo más recursos y buscar nombres desconocidos en internet.", "Escribir código en lenguaje Python para crear aplicaciones."],
        correct: "B", exp: "La B es la correcta; es la actividad práctica sugerida para entender qué pasa 'bajo el capó'." },
      { text: "¿Qué se recomienda hacer si aparece un proceso con un nombre raro en el sistema?",
        opts: ["Apagar la computadora inmediatamente y no volver a prenderla.", "Ignorarlo, ya que el sistema operativo lo borrará solo si es malo.", "Investigar su función en internet para ver si es una amenaza o un proceso vital."],
        correct: "C", exp: "La C es la correcta; se fomenta el pensamiento crítico investigando procesos desconocidos." }
    ];

    // Agregar bloque1 al banco con letras A,B,C
    block1.forEach((q, idx) => {
      bank.push({
        id: `q1-${idx}`,
        text: q.text,
        options: q.opts,
        correct: q.correct,
        explanation: q.exp
      });
    });

    // ----- Segundo bloque: 20 preguntas (archivo deepseek_html_20260415_ae0c48.html) -----
    const block2 = [
      { text: "¿Cuál es el propósito principal de la modularidad en el diseño de sistemas de software?",
        opts: ["Aumentar la velocidad de procesamiento de la CPU mediante la división de hilos.", "Dividir el sistema en componentes independientes para simplificar el desarrollo, las pruebas y la gestión de la complejidad.", "Garantizar que los datos sean persistentes en una base de datos relacional."],
        correct: "B", exp: "Correcta (B): La modularidad permite construir sistemas robustos al aislar módulos." },
      { text: "En una arquitectura de tres capas, ¿de qué se encarga específicamente la capa de presentación?",
        opts: ["Gestionar la lógica de negocio y los algoritmos del sistema.", "Proporcionar la interfaz de usuario (UI) y gestionar la interacción intuitiva, la entrada y visualización de datos.", "Ejecutar consultas CRUD directamente sobre la base de datos."],
        correct: "B", exp: "Correcta (B): Se enfoca en la experiencia del usuario." },
      { text: "¿Qué diferencia principal existe entre los algoritmos de planificación de CPU FIFO y Round Robin?",
        opts: ["FIFO asigna un tiempo limitado a cada proceso, mientras que Round Robin los ejecuta por orden de llegada.", "Ambos algoritmos son exclusivos para la gestión de memoria RAM.", "FIFO ejecuta procesos según su llegada y Round Robin asigna una porción equitativa de tiempo a cada tarea antes de pasar a la siguiente."],

      { text: "¿En qué consiste la técnica de 'paginación' en la administración de memoria del sistema operativo?",
        opts: ["Divide la memoria en bloques lógicos de tamaño variable según la necesidad del proceso.", "Divide la memoria en bloques fijos llamados páginas para optimizar el uso de la RAM.", "Es un método para comprimir archivos en el disco duro."],
        correct: "B", exp: "Correcta (B): La paginación usa bloques fijos (páginas)." },
      { text: "¿Cuál es una de las principales ventajas de utilizar colecciones inmutables en el desarrollo de software?",

      { text: "¿Por qué se recomienda el uso de `SparseArray` en lugar de `HashMap` en Android para mapear enteros a objetos?",

        correct: "B", exp: "Correcta (B): Evita autoboxing al usar claves enteras primitivas." },
      { text: "¿Qué función cumple la librería Room en el ecosistema de Android?",
        opts: ["Es un motor de base de datos no relacional que compite con Firebase.", "Es una capa de abstracción sobre SQLite que proporciona verificación de consultas en tiempo de compilación.", "Sirve para diseñar la interfaz de usuario de las aplicaciones mediante drag-and-drop."],
        correct: "B", exp: "Correcta (B): Room abstrae SQLite, verificando consultas en compilación." },
      { text: "En el contexto de bases de datos, ¿qué garantiza el acrónimo ACID?",
        opts: ["Que la base de datos es no relacional y altamente escalable horizontalmente.", "La gestión estructurada de datos bajo principios de Atomicidad, Consistencia, Aislamiento y Durabilidad.", "Que los datos se sincronizan en tiempo real con todos los dispositivos conectados."],
        correct: "B", exp: "Correcta (B): ACID garantiza integridad de transacciones." },
      { text: "¿Cuál es una característica distintiva de las bases de datos NoSQL como Realm o Firebase en Android?",
        opts: ["Requieren un esquema rígido y consultas SQL complejas para funcionar.", "No permiten el almacenamiento de datos de forma local en el dispositivo.", "Ofrecen flexibilidad de esquema y son ideales para datos semi-estructurados o que requieren sincronización en tiempo real."],
        correct: "C", exp: "Correcta (C): NoSQL ofrece flexibilidad de esquema y sincronización en tiempo real." },
      { text: "¿Cuál es el impacto negativo de crear demasiados índices en una base de datos?",
        opts: ["Las consultas de lectura (`SELECT`) se vuelven extremadamente lentas.", "Se penaliza el rendimiento de las operaciones de escritura (`INSERT`, `UPDATE`, `DELETE`).", "El tamaño de la base de datos en disco se reduce significativamente."],
        correct: "B", exp: "Correcta (B): Cada escritura requiere actualizar índices." },
      { text: "¿Para qué se utiliza el comando `ANALYZE` en SQLite dentro de Android?",
        opts: ["Para borrar todos los datos corruptos de la base de datos.", "Para ayudar al optimizador de consultas a elegir el mejor plan de ejecución mediante la recopilación de estadísticas de distribución de datos.", "Para encriptar la base de datos contra accesos no autorizados."],
        correct: "B", exp: "Correcta (B): ANALYZE recopila estadísticas para el optimizador." },
      { text: "En la optimización de consultas, ¿por qué es recomendable evitar el uso de `SELECT *`?",

      { text: "¿Qué función cumplen los 'drivers' en un sistema operativo?",

      { text: "¿Qué beneficio aporta la personalización de software mediante plugins o extensiones?",

      { text: "¿Cuál es una tendencia futura clave mencionada para los sistemas de software?",

      { text: "¿Cómo ayuda la cláusula `LIMIT` en la optimización de bases de datos Android?",

        correct: "B", exp: "Correcta (B): LIMIT permite paginación, reduciendo carga de memoria." },
      { text: "¿Cuál es la función de la capa de 'Lógica de Negocio'?",
        opts: ["Conectarse a internet para descargar actualizaciones.", "Implementar los algoritmos, validaciones y procesos que gobiernan el comportamiento y funcionalidad principal del sistema.", "Almacenar físicamente los archivos de imagen de la aplicación."],
        correct: "B", exp: "Correcta (B): La lógica de negocio es el cerebro del sistema." },
      { text: "¿Qué ventaja ofrece `LongSparseArray` sobre un `HashMap<Long, Object>`?",
        opts: ["Permite realizar búsquedas de texto completo en lenguaje natural.", "Ofrece beneficios de eficiencia de memoria al evitar el autoboxing de claves de tipo `long` en dispositivos móviles.", "Es la única estructura compatible con bases de datos relacionales."],
        correct: "B", exp: "Correcta (B): LongSparseArray evita autoboxing de long." }
    ];

    block2.forEach((q, idx) => {
      bank.push({
        id: `q2-${idx}`,
        text: q.text,
        options: q.opts,
        correct: q.correct,
        explanation: q.exp
      });
    });

    // ---------- VARIABLES GLOBALES ----------
    const TOTAL_QUESTIONS = 10;               // preguntas por evaluación
    let currentQuestions = [];                // array de objetos pregunta (seleccionadas)
    let userAnswers = new Array(TOTAL_QUESTIONS).fill(null); // 'A','B','C' o null

    const questionsArea = document.getElementById('questionsArea');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const checkBtn = document.getElementById('checkBtn');
    const newTestBtn = document.getElementById('newTestBtn');

    // ---------- FUNCIONES ----------
    function shufflePickN(n) {
      // Devuelve un array de n elementos distintos del banco
      const indices = Array.from({ length: bank.length }, (_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return indices.slice(0, n).map(idx => bank[idx]);
    }

    function resetAnswers() {
      userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
    }

    function generateNewTest() {
      currentQuestions = shufflePickN(TOTAL_QUESTIONS);
      resetAnswers();
      renderQuestions();
      updateScoreDisplay(0); // se limpia visualmente
    }

    function updateScoreDisplay(scoreValue = null) {
      if (scoreValue === null) {
        // calcular según respuestas actuales
        let correct = 0;
        for (let i = 0; i < TOTAL_QUESTIONS; i++) {
          if (userAnswers[i] && userAnswers[i] === currentQuestions[i].correct) correct++;
        }
        scoreDisplay.textContent = `${correct} / 10`;
      } else {
        scoreDisplay.textContent = `${scoreValue} / 10`;
      }
    }

    function renderQuestions() {
      if (!currentQuestions.length) return;
      let html = '';
      for (let i = 0; i < TOTAL_QUESTIONS; i++) {
        const q = currentQuestions[i];
        const selected = userAnswers[i];
        const letters = ['A', 'B', 'C'];
        
        let optionsHtml = '';
        q.options.forEach((optText, optIdx) => {
          const letter = letters[optIdx];
          const checked = (selected === letter) ? 'checked' : '';
          optionsHtml += `
            <div class="option" data-qidx="${i}" data-letter="${letter}">
              <input type="radio" name="q${i}" value="${letter}" id="q${i}_${letter}" ${checked}>
              <label for="q${i}_${letter}"><strong>${letter})</strong> ${optText}</label>
            </div>
          `;
        });

        // feedback se pinta vacío inicialmente, se llena con la corrección
        html += `
          <div class="question-card" id="card-${i}">
            <div class="question-header">
              <span class="q-num">Pregunta ${i+1}</span>
              <span>${q.text}</span>
            </div>
            <div class="options">
              ${optionsHtml}
            </div>
            <div class="feedback" id="fb-${i}"></div>
          </div>
        `;
      }
      questionsArea.innerHTML = html;

      // Asignar eventos a los radios
      for (let i = 0; i < TOTAL_QUESTIONS; i++) {
        const radios = document.querySelectorAll(`input[name="q${i}"]`);
        radios.forEach(radio => {
          radio.addEventListener('change', (e) => {
            const val = e.target.value;
            userAnswers[i] = val;
            // al cambiar respuesta, limpiamos feedback previo (si existía)
            const fbDiv = document.getElementById(`fb-${i}`);
            if (fbDiv) {
              fbDiv.innerHTML = '';
              fbDiv.className = 'feedback';
            }
            // actualizar puntuación mientras responde (opcional)
            updateScoreDisplay();
          });
        });
        // También hacer clic en el div .option
        const optionDivs = document.querySelectorAll(`.option[data-qidx="${i}"]`);
        optionDivs.forEach(div => {
          div.addEventListener('click', (e) => {
            const radio = div.querySelector('input[type="radio"]');
            if (radio && !radio.checked) {
              radio.checked = true;
              const letter = div.getAttribute('data-letter');
              userAnswers[i] = letter;
              const fbDiv = document.getElementById(`fb-${i}`);
              if (fbDiv) { fbDiv.innerHTML = ''; fbDiv.className = 'feedback'; }
              updateScoreDisplay();
            }
          });
        });
      }
      updateScoreDisplay();
    }

    function correctEvaluation() {
      // Muestra retroalimentación y calcula puntaje final
      let correctCount = 0;
      for (let i = 0; i < TOTAL_QUESTIONS; i++) {
        const q = currentQuestions[i];
        const userAns = userAnswers[i];
        const fbDiv = document.getElementById(`fb-${i}`);
        if (!fbDiv) continue;
        
        const isCorrect = (userAns && userAns === q.correct);
        if (isCorrect) correctCount++;
        
        const correctLetter = q.correct;
        const correctText = q.options[['A','B','C'].indexOf(correctLetter)];
        
        let fbHtml = '';
        if (!userAns) {
          fbHtml = `<span style="color:#b85e00;">⚠️ Sin responder. La respuesta correcta es ${correctLetter}) ${correctText}.<br>${q.explanation}</span>`;
          fbDiv.className = 'feedback incorrect';
        } else if (isCorrect) {
          fbHtml = `✅ <strong>¡Correcto!</strong> ${q.explanation}`;
          fbDiv.className = 'feedback correct';
        } else {
          fbHtml = `❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter}) ${correctText}.<br>${q.explanation}`;
          fbDiv.className = 'feedback incorrect';
        }
        fbDiv.innerHTML = fbHtml;
      }
      updateScoreDisplay(correctCount);
      // Mostrar alerta opcional con resultado
      alert(`📊 Evaluación corregida.\nAciertos: ${correctCount} de 10 (${correctCount*10}%)\nPuedes revisar los detalles en pantalla.`);
    }

    // ---------- INICIALIZACIÓN Y EVENTOS ----------
    function init() {
      generateNewTest(); // primera prueba aleatoria
    }

    checkBtn.addEventListener('click', () => {
      if (!currentQuestions.length) return;
      // Verificar si hay preguntas sin responder? No obligatorio, se marcarán como incorrectas.
      correctEvaluation();
    });

    newTestBtn.addEventListener('click', () => {
      generateNewTest();
    });

    init();
  })();
</script>
</body>
</html>
